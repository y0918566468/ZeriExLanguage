spring:
  application:
    name: ZeriExLanguage

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    # 💡 關鍵：告訴 Spring 等 Hibernate 把表建好了，再跑 data.sql
    defer-datasource-initialization: true

  sql:
    init:
      mode: always # 💡 改回 always，讓它去讀取 data.sql

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080